<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wery AI - UI 原型索引</title>
<style>
  :root {
    --surface-0: #161616; --surface-1: #1e1e1e; --surface-2: #262626;
    --text-primary: #ececec; --text-secondary: #9c9c9c; --text-tertiary: #6b6b6b;
    --accent: #d4a853; --border: #2a2a2a; --border-visible: #383838;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: "Inter", "阿里巴巴普惠体", -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--surface-0); color: var(--text-primary);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .container { max-width: 640px; padding: 40px 24px; }
  h1 { font-size: 28px; font-weight: 600; margin-bottom: 4px; }
  .sub { color: var(--text-tertiary); font-size: 14px; margin-bottom: 40px; }
  .module-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  a.module {
    display: block; padding: 18px 20px; background: var(--surface-1);
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--text-primary); text-decoration: none; transition: all 0.12s;
  }
  a.module:hover { border-color: var(--border-visible); background: var(--surface-2); }
  a.module .num { font-size: 11px; color: var(--text-tertiary); margin-bottom: 4px; }
  a.module .title { font-size: 15px; font-weight: 500; }
  a.module.admin-item { border-left: 3px solid var(--accent); }
  .section-label { font-size: 12px; color: var(--text-tertiary); margin: 28px 0 10px; text-transform: uppercase; letter-spacing: 0.5px; }
</style>
</head>
<body>
<div class="container">
  <h1>Wery AI</h1>
  <div class="sub">UI 原型 — 全部 12 个模块 · 暖灰暗色 + 编辑感排版</div>

  <div class="section-label">前台 · 账户</div>
  <div class="module-grid">
    <a href="login.html" class="module">
      <div class="num">模块 1</div>
      <div class="title">注册 / 登录</div>
    </a>
    <a href="workbench.html" class="module">
      <div class="num">模块 2</div>
      <div class="title">文案制作</div>
    </a>
  </div>

  <div class="section-label">前台 · AI 创作工具</div>
  <div class="module-grid">
    <a href="image-gen.html" class="module">
      <div class="num">模块 3</div>
      <div class="title">文生图</div>
    </a>
    <a href="video-gen.html" class="module">
      <div class="num">模块 4</div>
      <div class="title">图生视频</div>
    </a>
    <a href="preview.html" class="module">
      <div class="num">模块 5</div>
      <div class="title">效果预览</div>
    </a>
  </div>

  <div class="section-label">前台 · 资源与发布</div>
  <div class="module-grid">
    <a href="resources.html" class="module">
      <div class="num">模块 6</div>
      <div class="title">我的资源</div>
    </a>
    <a href="publish.html" class="module">
      <div class="num">模块 7</div>
      <div class="title">资源发布</div>
    </a>
  </div>

  <div class="section-label">前台 · 会员与账单</div>
  <div class="module-grid">
    <a href="billing.html" class="module">
      <div class="num">模块 8-10</div>
      <div class="title">会员订阅 · 充值 · 账单</div>
    </a>
  </div>

  <div class="section-label">管理后台</div>
  <div class="module-grid">
    <a href="admin.html" class="module admin-item">
      <div class="num">模块 11-12</div>
      <div class="title">管理后台</div>
    </a>
  </div>
</div>
</body>
</html>
