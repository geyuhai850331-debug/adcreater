<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DreamCast — 文生图</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&family=Work+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg-base:#080808;--bg-surface:#111;--bg-elevated:#18181A;
  --border-subtle:#252528;--border-visible:#333338;
  --text-primary:#F0EDE8;--text-secondary:#8B8680;--text-tertiary:#55514D;
  --accent:#67D8AE;--accent-soft:#8FE0C2;--status-warning:#E5B84C;
  --hover:rgba(255,255,255,.04);--selected:rgba(103,216,174,.10);
  --font-display:'Cormorant Garamond',serif;--font-ui:'Work Sans',sans-serif;--font-mono:'JetBrains Mono',monospace;
  --sp:4px;--sp-sm:8px;--sp-md:16px;--sp-lg:24px;--sp-xl:32px;--sp-2xl:48px;
  --r-sm:2px;--r-md:4px;--r-lg:8px;
  --ease:cubic-bezier(.16,1,.3,1);--dur:250ms;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}body{font-family:var(--font-ui);background:var(--bg-base);color:var(--text-primary);min-height:100vh;line-height:1.6;display:flex;flex-direction:column}
button{font-family:var(--font-ui);cursor:pointer;border:none;background:none;color:inherit}
textarea{font-family:var(--font-mono);font-size:.9375rem;line-height:1.8;color:var(--text-primary);background:transparent;border:none;outline:none;width:100%;resize:none;caret-color:var(--accent)}
textarea::placeholder{color:var(--text-tertiary)}

.topbar{display:flex;align-items:center;padding:var(--sp-md) var(--sp-xl);border-bottom:1px solid var(--border-subtle);gap:var(--sp-xl);flex-shrink:0}
.brand{font-family:var(--font-display);font-size:1.5rem;font-weight:300;letter-spacing:.08em}
.br{font-size:.75rem;color:var(--text-tertiary)}.br span{color:var(--text-secondary)}
.tr{margin-left:auto;display:flex;align-items:center;gap:var(--sp-md)}
.pts{font-family:var(--font-mono);font-size:.75rem;color:var(--accent)}
.av{width:28px;height:28px;border-radius:50%;background:var(--accent);color:var(--bg-base);font-family:var(--font-mono);font-size:.75rem;font-weight:500;display:flex;align-items:center;justify-content:center}

.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:220px;flex-shrink:0;background:rgba(17,17,17,.85);backdrop-filter:blur(24px);border-right:1px solid var(--border-subtle);padding:var(--sp-lg) var(--sp-md);overflow-y:auto}
.side-s{font-size:.625rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-tertiary);padding:var(--sp-lg) var(--sp-sm) var(--sp-xs)}.side-s:first-child{padding-top:0}
.side-i{display:flex;align-items:center;gap:var(--sp-sm);font-size:.8125rem;padding:8px 12px;margin-bottom:2px;border-radius:var(--r-sm);color:var(--text-secondary);transition:all var(--dur);width:100%;text-align:left}
.side-i:hover{color:var(--text-primary);background:var(--hover)}
.side-i.active{color:var(--text-primary);background:var(--selected)}
.side-d{width:5px;height:5px;border-radius:50%;background:var(--accent);opacity:0}.side-i.active .side-d{opacity:1}

.canvas{flex:1;overflow-y:auto;padding:var(--sp-xl)}
.ch-bar{display:flex;align-items:center;gap:var(--sp-md);margin-bottom:var(--sp-lg);flex-wrap:wrap;flex-shrink:0}
.ch-l{font-size:.625rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-tertiary)}
.ch-p{font-family:var(--font-mono);font-size:.75rem;padding:4px 12px;border-radius:var(--r-sm);transition:all var(--dur)}
.ch-p.active{background:var(--selected);color:var(--accent)}
.ch-p.opt{background:var(--hover);color:var(--text-primary);cursor:pointer}.ch-p.opt:hover{background:var(--selected);color:var(--accent)}
.ch-d{width:1px;height:20px;background:var(--border-subtle)}

.split{display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-xl);flex:1}
.split-left{display:flex;flex-direction:column}
.split-left textarea{flex:1;min-height:200px;padding:0}

/* Model switch row */
.model-row{display:flex;gap:var(--sp-sm);margin-bottom:var(--sp-lg)}
.model-btn{font-family:var(--font-mono);font-size:.6875rem;padding:6px 14px;border-radius:var(--r-sm);color:var(--text-tertiary);border:1px solid var(--border-subtle);transition:all var(--dur)}
.model-btn:hover{border-color:var(--border-visible);color:var(--text-secondary)}
.model-btn.active{border-color:var(--accent);color:var(--accent);background:var(--selected)}

/* Template gallery below */
.tpl-title{font-size:.625rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-tertiary);margin-bottom:var(--sp-md)}
.tpl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:var(--sp-sm);margin-bottom:var(--sp-lg)}
.tpl-card{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--r-md);padding:var(--sp-md);cursor:pointer;transition:all var(--dur);text-align:center}
.tpl-card:hover{border-color:var(--border-visible)}
.tpl-card.active{border-color:var(--accent);background:var(--selected)}
.tpl-preview{height:80px;background:linear-gradient(135deg,var(--bg-elevated),var(--bg-surface));border-radius:var(--r-sm);margin-bottom:var(--sp-sm);display:flex;align-items:center;justify-content:center;font-size:1.5rem;opacity:.5}
.tpl-name{font-size:.6875rem;font-weight:500;margin-bottom:2px}
.tpl-desc{font-size:.625rem;color:var(--text-tertiary)}

.split-right{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;min-height:400px;position:relative}
.split-right::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(103,216,174,.04),transparent 70%)}
.preview-placeholder{position:relative;z-index:1;text-align:center}
.preview-icon{font-size:3rem;opacity:.3;margin-bottom:var(--sp-md)}
.preview-text{font-family:var(--font-mono);font-size:.75rem;color:var(--text-tertiary)}

/* Bottom bar */
.btm{display:flex;justify-content:space-between;align-items:center;padding:var(--sp-md) var(--sp-xl);border-top:1px solid var(--border-subtle);flex-shrink:0}
.btm-l{font-family:var(--font-mono);font-size:.6875rem;color:var(--text-tertiary)}
.btm-r{display:flex;align-items:center;gap:var(--sp-md)}
.btm-cost{font-family:var(--font-mono);font-size:.75rem;color:var(--accent)}
.btn-gen{font-family:var(--font-mono);font-size:.75rem;font-weight:500;background:var(--accent);color:var(--bg-base);padding:8px 20px;border-radius:var(--r-sm);letter-spacing:.02em;transition:all var(--dur)}
.btn-gen:hover{background:var(--accent-soft)}

/* Style presets */
.style-grid{display:flex;gap:var(--sp-sm);margin-bottom:var(--sp-lg);flex-wrap:wrap}
.style-btn{font-family:var(--font-mono);font-size:.625rem;padding:4px 10px;border-radius:var(--r-sm);color:var(--text-tertiary);border:1px solid var(--border-subtle);transition:all var(--dur)}
.style-btn.active{border-color:var(--accent);color:var(--accent);background:var(--selected)}
.style-btn:hover:not(.active){border-color:var(--border-visible);color:var(--text-secondary)}

@media(max-width:768px){
  .sidebar{display:none}.split{grid-template-columns:1fr}
}
</style>
</head>
<body>
<header class="topbar"><span class="brand">DreamCast</span><span class="br">AI 电商 <span>/</span> 文生图制作</span><div class="tr"><span class="pts">18,500 pts</span><div class="av">L</div></div></header>

<div class="layout">
  <nav class="sidebar">
    <div class="side-s">AI 电商</div>
    <button class="side-i"><span class="side-d"></span>营销文案制作</button>
    <button class="side-i active"><span class="side-d"></span>文生图制作</button>
    <button class="side-i"><span class="side-d"></span>图生视频制作</button>
    <div class="side-s">Resources</div>
    <button class="side-i"><span class="side-d"></span>效果预览</button>
    <button class="side-i"><span class="side-d"></span>资源发布</button>
    <div class="side-s">Coming Soon</div>
    <button class="side-i" style="color:var(--text-disabled);opacity:.5;cursor:not-allowed">图片翻译</button>
    <button class="side-i" style="color:var(--text-disabled);opacity:.5;cursor:not-allowed">数字人</button>
  </nav>

  <div class="canvas">
    <!-- Model switch -->
    <div class="model-row">
      <button class="model-btn active" onclick="switchModel(this,'FLUX')">FLUX 1.1 Pro</button>
      <button class="model-btn" onclick="switchModel(this,'SDXL')">SDXL</button>
      <button class="model-btn" onclick="switchModel(this,'Imagen')">Imagen 3</button>
      <button class="model-btn" onclick="switchModel(this,'Dream')">DreamShaper</button>
    </div>

    <!-- Style presets -->
    <div class="style-grid">
      <button class="style-btn active">电商白底主图</button>
      <button class="style-btn">生活场景图</button>
      <button class="style-btn">九宫格模板</button>
      <button class="style-btn">细节特写</button>
      <button class="style-btn">模特实拍</button>
      <button class="style-btn">日系清新</button>
      <button class="style-btn">欧美简约</button>
    </div>

    <div class="split">
      <div class="split-left">
        <textarea placeholder="Describe the product image you want to create...&#10;&#10;e.g. 美白精华液产品图、白色背景、玻璃瓶、简约高级感、&#10;柔光、产品居中、无水印、Amazon主图规格">美白精华液 30ml 玻璃瓶装 白色背景
产品居中构图 柔光照明
简约高级感 无阴影
Amazon主图规格 2000x2000px
无水印 无文字</textarea>
      </div>
      <div class="split-right">
        <div class="preview-placeholder">
          <div class="preview-icon">&#9638;</div>
          <div class="preview-text">Image preview<br>will appear here</div>
        </div>
      </div>
    </div>

    <!-- Templates below -->
    <div style="margin-top:var(--sp-xl)">
      <div class="tpl-title">Templates</div>
      <div class="tpl-grid">
        <div class="tpl-card active">
          <div class="tpl-preview">&#9638;</div>
          <div class="tpl-name">Main Image</div>
          <div class="tpl-desc">2000×2000</div>
        </div>
        <div class="tpl-card">
          <div class="tpl-preview">&#9642;</div>
          <div class="tpl-name">Lifestyle</div>
          <div class="tpl-desc">2000×2000</div>
        </div>
        <div class="tpl-card">
          <div class="tpl-preview">&#9643;</div>
          <div class="tpl-name">Grid 9</div>
          <div class="tpl-desc">9 images</div>
        </div>
        <div class="tpl-card">
          <div class="tpl-preview">&#9644;</div>
          <div class="tpl-name">Banner</div>
          <div class="tpl-desc">1200×400</div>
        </div>
        <div class="tpl-card">
          <div class="tpl-preview">&#9645;</div>
          <div class="tpl-name">A+ Module</div>
          <div class="tpl-desc">970×600</div>
        </div>
        <div class="tpl-card">
          <div class="tpl-preview">&#9646;</div>
          <div class="tpl-name">Detail</div>
          <div class="tpl-desc">1500×1500</div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="btm">
  <span class="btm-l">Cmd+Enter to generate · 1 image</span>
  <div class="btm-r">
    <span class="btm-cost">200 pts</span>
    <button class="btn-gen">Generate Image</button>
  </div>
</div>

<script>
document.querySelectorAll('.model-btn').forEach(b=>b.addEventListener('click',function(){switchModel(this,this.dataset.model)}));
function switchModel(btn,name){document.querySelectorAll('.model-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active')}
document.querySelectorAll('.tpl-card').forEach(c=>c.addEventListener('click',function(){document.querySelectorAll('.tpl-card').forEach(x=>x.classList.remove('active'));this.classList.add('active')}));
document.querySelectorAll('.style-btn').forEach(b=>b.addEventListener('click',function(){document.querySelectorAll('.style-btn').forEach(x=>x.classList.remove('active'));this.classList.add('active')}));
</script>
</body>
</html>
